<section class="screen-container" [class.visible]="isVisible">
  
  <div class="vignette-overlay"></div>

  <!-- Canvas Three.js для центральной суперновы -->
  <canvas #threeCanvas class="three-canvas"></canvas>

  <div class="main-content" #mainContent>
    <h1 class="logo-title">
      <span class="letter" data-text="J" style="--delay: 0.1s">J</span>
      <span class="letter" data-text="C" style="--delay: 0.2s">C</span>
      <span class="letter" data-text="V" style="--delay: 0.3s">V</span>
      <span class="letter space" style="--delay: 0.4s"> </span>
      <span class="letter" data-text="C" style="--delay: 0.5s">C</span>
      <span class="letter" data-text="O" style="--delay: 0.6s">O</span>
      <span class="letter" data-text="D" style="--delay: 0.7s">D</span>
      <span class="letter" data-text="E" style="--delay: 0.8s">E</span>
    </h1>
    <div class="decorative-line"></div>
    <p class="subtitle">Digital Core</p>
  </div>

  <!-- Scroll Down Hint -->
  <div class="scroll-hint" #scrollHint>
    <div class="hint-desktop">
      <div class="mouse-icon">
        <div class="wheel"></div>
      </div>
      <p class="scroll-text">Baja con el mouse</p>
    </div>
    
    <div class="hint-mobile">
      <div class="swipe-arrow">↓</div>
      <p class="scroll-text">Desliza para explorar</p>
    </div>
  </div>

  <!-- Skip Button / Keyboard Hint -->
  <div class="skip-container animate__animated animate__fadeIn" [class.hidden]="!isVisible">
    <button class="skip-button" (click)="skipAnimation()">
      <span class="skip-text">Saltar Animación</span>
      <span class="kb-hint">Presiona cualquier tecla</span>
    </button>
  </div>

</section>
