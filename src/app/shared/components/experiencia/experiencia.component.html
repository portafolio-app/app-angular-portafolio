<div class="card-ed card-pad">
  <div class="section-head">
    <i class="fas fa-briefcase"></i>
    <h2>{{ 'NAVBAR.EXPERIENCE' | translate }}</h2>
  </div>

  <div>
    <div *ngFor="let exp of experiences; let last = last" class="relative pl-7" [class.pb-7]="!last">
      <!-- Línea -->
      <span *ngIf="!last" class="absolute left-[3px] top-3 bottom-0 w-px" style="background: var(--border);"></span>
      <!-- Punto -->
      <span class="tl-dot absolute left-0 top-1.5"></span>

      <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mb-1.5">
        <span class="text-xs font-semibold" style="color: var(--accent);">{{ exp.period | translate }}</span>
        <span *ngIf="exp.current" class="inline-flex items-center gap-1.5 text-[0.65rem] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full"
          style="background: var(--accent-soft); color: var(--accent);">
          <span class="w-1.5 h-1.5 rounded-full" style="background: var(--accent);"></span>{{ 'EXPERIENCE.CURRENT' | translate }}
        </span>
        <span class="text-[0.7rem]" style="color: var(--text-faint);">· {{ exp.location | translate }}</span>
      </div>

      <h3 class="text-[0.98rem] font-bold leading-snug">{{ exp.title | translate }}</h3>
      <p class="text-[0.85rem] font-medium mb-2" style="color: var(--text-muted);">{{ exp.company | translate }}</p>
      <p class="text-[0.85rem] leading-relaxed mb-3" style="color: var(--text-muted); max-width: 44rem;">
        {{ exp.description | translate }}
      </p>

      <div class="flex flex-wrap gap-1.5">
        <span *ngFor="let t of exp.technologies" class="tag-ed">{{ t }}</span>
      </div>
    </div>
  </div>
</div>
