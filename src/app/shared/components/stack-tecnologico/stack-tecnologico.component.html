<div class="card-ed card-pad">
  <div class="section-head">
    <i class="fas fa-layer-group"></i>
    <h2>{{ 'NAVBAR.TECHNOLOGIES' | translate }}</h2>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-8">
    <!-- Frontend -->
    <div>
      <h3 class="text-[0.7rem] font-bold uppercase tracking-wider mb-3.5" style="color: var(--text-faint);">Frontend</h3>
      <ul class="space-y-2.5">
        <li *ngFor="let tech of frontend; trackBy: trackByTech" class="flex items-center gap-2.5 text-[0.85rem]" style="color: var(--text-muted);">
          <img [src]="tech.icon" (error)="handleTechIconError($event)" alt="" class="w-4 h-4 object-contain">
          <span>{{ tech.name }}</span>
        </li>
      </ul>
    </div>

    <!-- Backend -->
    <div>
      <h3 class="text-[0.7rem] font-bold uppercase tracking-wider mb-3.5" style="color: var(--text-faint);">Backend</h3>
      <ul class="space-y-2.5">
        <li *ngFor="let tech of backend; trackBy: trackByTech" class="flex items-center gap-2.5 text-[0.85rem]" style="color: var(--text-muted);">
          <img [src]="tech.icon" (error)="handleTechIconError($event)" alt="" class="w-4 h-4 object-contain">
          <span>{{ tech.name }}</span>
        </li>
      </ul>
    </div>

    <!-- Bases de datos -->
    <div>
      <h3 class="text-[0.7rem] font-bold uppercase tracking-wider mb-3.5" style="color: var(--text-faint);">Bases de datos</h3>
      <ul class="space-y-2.5">
        <li *ngFor="let tech of databases; trackBy: trackByTech" class="flex items-center gap-2.5 text-[0.85rem]" style="color: var(--text-muted);">
          <img [src]="tech.icon" (error)="handleTechIconError($event)" alt="" class="w-4 h-4 object-contain">
          <span>{{ tech.name }}</span>
        </li>
      </ul>
    </div>

    <!-- DevOps & Tools -->
    <div>
      <h3 class="text-[0.7rem] font-bold uppercase tracking-wider mb-3.5" style="color: var(--text-faint);">DevOps & Tools</h3>
      <ul class="space-y-2.5">
        <li *ngFor="let tech of tools; trackBy: trackByTech" class="flex items-center gap-2.5 text-[0.85rem]" style="color: var(--text-muted);">
          <img [src]="tech.icon" (error)="handleTechIconError($event)" alt="" class="w-4 h-4 object-contain">
          <span>{{ tech.name }}</span>
        </li>
      </ul>
    </div>
  </div>
</div>
