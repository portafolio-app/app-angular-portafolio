<!-- Navbar profesional -->
<nav [@slideDown]="navbarState"
  class="fixed top-0 left-0 w-full z-50 border-b backdrop-blur-md"
  style="background: color-mix(in srgb, var(--bg) 90%, transparent); border-color: var(--border);">
  <div class="container-ed">
    <div class="flex items-center justify-between h-16">

      <!-- Wordmark -->
      <a (click)="navigateToPage('/')" class="group flex items-center gap-2.5 cursor-pointer select-none">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-md text-sm font-bold"
          style="background: var(--accent-soft); color: var(--accent);">&lt;/&gt;</span>
        <span class="text-[1rem] font-bold tracking-tight" style="color: var(--text);">Jorge Castillo</span>
      </a>

      <!-- Navegación desktop -->
      <div [@fadeIn]="menuItemsState" class="hidden md:flex items-center gap-6 text-[0.875rem] font-medium">
        <button (click)="scrollToSection('home')" class="link-ed py-1">{{ 'NAVBAR.HOME' | translate }}</button>
        <button (click)="scrollToSection('sobre-mi')" class="link-ed py-1">{{ 'NAVBAR.ABOUT' | translate }}</button>
        <button (click)="scrollToSection('tecnologias')" class="link-ed py-1">{{ 'NAVBAR.TECHNOLOGIES' | translate }}</button>
        <button (click)="navigateToPage('/proyectos')" class="link-ed py-1">{{ 'NAVBAR.PROJECTS' | translate }}</button>
        <button (click)="scrollToSection('experiencia')" class="link-ed py-1">{{ 'NAVBAR.EXPERIENCE' | translate }}</button>
        <button (click)="scrollToSection('certificaciones')" class="link-ed py-1">{{ 'NAVBAR.CERTIFICATIONS' | translate }}</button>
      </div>

      <!-- Controles derecha -->
      <div [@fadeIn]="menuItemsState" class="flex items-center gap-2">
        <!-- Idioma -->
        <div class="hidden sm:flex items-center text-xs font-medium">
          <button (click)="switchLanguage('es')" class="px-1.5 py-1"
            [style.color]="currentLang === 'es' ? 'var(--accent)' : 'var(--text-faint)'">ES</button>
          <span style="color: var(--border-strong);">/</span>
          <button (click)="switchLanguage('en')" class="px-1.5 py-1"
            [style.color]="currentLang === 'en' ? 'var(--accent)' : 'var(--text-faint)'">EN</button>
        </div>

        <!-- Tema -->
        <button (click)="toggleTheme()" aria-label="Cambiar tema" class="icon-btn">
          <svg *ngIf="!isDarkMode" class="w-[1.05rem] h-[1.05rem]" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 2v2m0 16v2m10-10h-2M4 12H2m15.071-7.071l-1.414 1.414M6.343 17.657l-1.414 1.414M17.657 17.657l1.414 1.414M6.343 6.343L4.929 4.929M12 6a6 6 0 100 12 6 6 0 000-12z"></path>
          </svg>
          <svg *ngIf="isDarkMode" class="w-[1.05rem] h-[1.05rem]" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 1021 12.79z"></path>
          </svg>
        </button>

        <!-- Menú móvil -->
        <button (click)="toggleMenu()" id="menu-toggle" type="button"
          [attr.aria-label]="isMenuOpen ? 'Cerrar menú' : 'Abrir menú'" [attr.aria-expanded]="isMenuOpen"
          class="md:hidden icon-btn">
          <svg *ngIf="!isMenuOpen" class="w-[1.05rem] h-[1.05rem]" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          <svg *ngIf="isMenuOpen" class="w-[1.05rem] h-[1.05rem]" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Menú móvil -->
    <div *ngIf="isMenuOpen" @mobileMenu class="md:hidden border-t py-3" style="border-color: var(--border);">
      <div class="flex flex-col text-[0.95rem] font-medium">
        <button (click)="scrollToSection('home')" class="text-left py-2.5" style="color: var(--text);">{{ 'NAVBAR.HOME' | translate }}</button>
        <button (click)="scrollToSection('sobre-mi')" class="text-left py-2.5" style="color: var(--text);">{{ 'NAVBAR.ABOUT' | translate }}</button>
        <button (click)="scrollToSection('tecnologias')" class="text-left py-2.5" style="color: var(--text);">{{ 'NAVBAR.TECHNOLOGIES' | translate }}</button>
        <button (click)="navigateToPage('/proyectos')" class="text-left py-2.5" style="color: var(--text);">{{ 'NAVBAR.PROJECTS' | translate }}</button>
        <button (click)="scrollToSection('experiencia')" class="text-left py-2.5" style="color: var(--text);">{{ 'NAVBAR.EXPERIENCE' | translate }}</button>
        <button (click)="scrollToSection('certificaciones')" class="text-left py-2.5" style="color: var(--text);">{{ 'NAVBAR.CERTIFICATIONS' | translate }}</button>
        <div class="flex items-center gap-3 pt-3 mt-2 border-t text-sm" style="border-color: var(--border);">
          <button (click)="switchLanguage('es')" [style.color]="currentLang === 'es' ? 'var(--accent)' : 'var(--text-faint)'">ES</button>
          <button (click)="switchLanguage('en')" [style.color]="currentLang === 'en' ? 'var(--accent)' : 'var(--text-faint)'">EN</button>
        </div>
      </div>
    </div>
  </div>
</nav>
